<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全国路亚钓点地图 - 查找附近钓点</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Leaflet 地图 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#E8F5F5', 100: '#C9E8E8', 200: '#9DD6D6', 300: '#6BC0C0', 400: '#3FA8A8', 500: '#2D7D7D', 600: '#256666', 700: '#1F5252', 800: '#1A4343', 900: '#1A4D4D' },
                        accent: { light: '#F4A460', DEFAULT: '#D97B3D', dark: '#B8642B' }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .hero-gradient { background: linear-gradient(135deg, #1A4D4D 0%, #2D7D7D 50%, #3FA8A8 100%); }
        #map { height: 600px; width: 100%; border-radius: 1rem; }
        .spot-card { transition: all 0.3s ease; }
        .spot-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
        .filter-btn.active { background: #2D7D7D; color: white; }
        .leaflet-popup-content-wrapper { border-radius: 12px; }
        .leaflet-popup-content { margin: 0; }
    </style>
</head>
<body class="bg-gray-50">

    <!-- 导航栏 -->
    <nav class="bg-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="flex items-center space-x-2">
                    <i data-lucide="fish" class="w-8 h-8 text-primary-500"></i>
                    <span class="text-xl font-bold text-gray-900">路亚钓鱼</span>
                </a>
                <div class="hidden md:flex space-x-8">
                    <a href="index.html" class="text-gray-700 hover:text-primary-500 font-medium">首页</a>
                    <a href="guide.html" class="text-gray-700 hover:text-primary-500 font-medium">入门指南</a>
                    <a href="#" class="text-primary-500 font-medium">钓点推荐</a>
                    <a href="gear.html" class="text-gray-700 hover:text-primary-500 font-medium">装备库</a>
                </div>
                <a href="guide.html" class="bg-primary-500 hover:bg-primary-600 text-white px-6 py-2 rounded-lg font-medium transition">开始学习</a>
            </div>
        </div>
    </nav>

    <!-- 页面标题 -->
    <section class="hero-gradient text-white py-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <h1 class="text-4xl md:text-5xl font-bold mb-4">全国钓点地图</h1>
            <p class="text-xl text-primary-100 mb-8">2000+ 真实钓点，找到你附近的路亚天堂</p>
            
            <!-- 搜索框 -->
            <div class="max-w-3xl mx-auto">
                <div class="bg-white rounded-2xl shadow-2xl p-4">
                    <div class="flex flex-col md:flex-row gap-4">
                        <div class="flex-grow relative">
                            <i data-lucide="search" class="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 w-5 h-5"></i>
                            <input type="text" id="searchInput" placeholder="搜索钓点名称、城市、鱼种..." class="w-full pl-12 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 text-gray-900">
                        </div>
                        <button onclick="searchSpots()" class="bg-primary-500 hover:bg-primary-600 text-white px-8 py-3 rounded-lg font-medium transition inline-flex items-center justify-center">
                            <i data-lucide="search" class="w-5 h-5 mr-2"></i>
                            搜索
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 地图区域 -->
    <section class="py-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="bg-white rounded-2xl shadow-lg p-4">
                <div id="map"></div>
            </div>
        </div>
    </section>

    <!-- 筛选器 -->
    <section class="py-8 bg-white border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-wrap items-center gap-4">
                <span class="text-sm font-medium text-gray-700">筛选：</span>
                
                <!-- 省份筛选 -->
                <select id="provinceFilter" onchange="filterSpots()" class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500">
                    <option value="">全部省份</option>
                    <option value="浙江">浙江</option>
                    <option value="广东">广东</option>
                    <option value="湖北">湖北</option>
                    <option value="江苏">江苏</option>
                    <option value="四川">四川</option>
                    <option value="云南">云南</option>
                    <option value="北京">北京</option>
                </select>
                
                <!-- 鱼种筛选 -->
                <div class="flex gap-2">
                    <button class="filter-btn active px-4 py-2 rounded-lg text-sm font-medium border border-gray-300 hover:border-primary-500" data-fish="all" onclick="filterByFish('all')">全部鱼种</button>
                    <button class="filter-btn px-4 py-2 rounded-lg text-sm font-medium border border-gray-300 hover:border-primary-500" data-fish="鲈鱼" onclick="filterByFish('鲈鱼')">鲈鱼</button>
                    <button class="filter-btn px-4 py-2 rounded-lg text-sm font-medium border border-gray-300 hover:border-primary-500" data-fish="翘嘴" onclick="filterByFish('翘嘴')">翘嘴</button>
                    <button class="filter-btn px-4 py-2 rounded-lg text-sm font-medium border border-gray-300 hover:border-primary-500" data-fish="鳜鱼" onclick="filterByFish('鳜鱼')">鳜鱼</button>
                    <button class="filter-btn px-4 py-2 rounded-lg text-sm font-medium border border-gray-300 hover:border-primary-500" data-fish="鳡鱼" onclick="filterByFish('鳡鱼')">鳡鱼</button>
                </div>
                
                <!-- 收费类型 -->
                <div class="flex gap-2 ml-auto">
                    <button class="filter-btn active px-4 py-2 rounded-lg text-sm font-medium border border-gray-300" data-type="all" onclick="filterByType('all')">全部</button>
                    <button class="filter-btn px-4 py-2 rounded-lg text-sm font-medium border border-gray-300" data-type="free" onclick="filterByType('free')">免费</button>
                    <button class="filter-btn px-4 py-2 rounded-lg text-sm font-medium border border-gray-300" data-type="paid" onclick="filterByType('paid')">收费</button>
                </div>
            </div>
        </div>
    </section>

    <!-- 钓点列表 -->
    <section class="py-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="mb-6 flex items-center justify-between">
                <p class="text-gray-600">找到 <span id="spotCount" class="font-bold text-primary-500">0</span> 个钓点</p>
                <select class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500">
                    <option>默认排序</option>
                    <option>评分最高</option>
                    <option>最近热门</option>
                    <option>距离最近</option>
                </select>
            </div>
            
            <div id="spotsGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- 钓点卡片由 JS 动态生成 -->
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="bg-gray-900 text-gray-300 py-12 mt-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center">
                <div class="flex items-center justify-center space-x-2 mb-4">
                    <i data-lucide="fish" class="w-6 h-6 text-primary-400"></i>
                    <span class="text-lg font-bold text-white">路亚钓鱼</span>
                </div>
                <p class="text-sm text-gray-400">&copy; 2026 路亚钓鱼网。All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- 钓点数据 -->
    <script src="database.js"></script>
    <script>
        let map;
        let markers = [];
        let filteredSpots = [];

        // 初始化地图
        function initMap() {
            // 创建地图，中心点设在中国中部
            map = L.map('map').setView([30.5, 114.3], 5);
            
            // 添加 OpenStreetMap 图层
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 18
            }).addTo(map);
            
            // 添加钓点标记
            addSpotMarkers(spotsDatabase);
        }

        // 添加钓点标记
        function addSpotMarkers(spots) {
            // 清除现有标记
            markers.forEach(marker => map.removeLayer(marker));
            markers = [];
            
            spots.forEach(spot => {
                if (spot.coords) {
                    const marker = L.marker([spot.coords.lat, spot.coords.lng])
                        .addTo(map)
                        .bindPopup(`
                            <div class="p-2">
                                <h3 class="font-bold text-lg mb-1">${spot.name}</h3>
                                <p class="text-sm text-gray-600 mb-2">${spot.province} · ${spot.city}</p>
                                <div class="flex items-center mb-2">
                                    <i data-lucide="star" class="w-4 h-4 text-yellow-500 fill-yellow-500 mr-1"></i>
                                    <span class="font-medium">${spot.rating}</span>
                                    <span class="text-gray-500 text-sm ml-1">(${spot.reviews})</span>
                                </div>
                                <div class="flex gap-2 mb-2">
                                    ${spot.fish.map(f => `<span class="bg-blue-100 text-blue-700 px-2 py-1 rounded text-xs">${f}</span>`).join('')}
                                </div>
                                <p class="text-sm text-gray-700 mb-2">${spot.description}</p>
                                <div class="flex items-center justify-between">
                                    <span class="${spot.type === 'free' ? 'text-green-600' : 'text-primary-600'} font-medium text-sm">${spot.price}</span>
                                    <button onclick="viewSpotDetail(${spot.id})" class="bg-primary-500 hover:bg-primary-600 text-white px-3 py-1 rounded text-sm">详情</button>
                                </div>
                            </div>
                        `);
                    
                    markers.push(marker);
                }
            });
            
            lucide.createIcons();
        }

        // 渲染钓点卡片
        function renderSpots(spots) {
            const grid = document.getElementById('spotsGrid');
            const countEl = document.getElementById('spotCount');
            
            filteredSpots = spots;
            countEl.textContent = spots.length;
            
            if (spots.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-16">
                        <i data-lucide="map-pin-off" class="w-16 h-16 text-gray-300 mx-auto mb-4"></i>
                        <p class="text-gray-500 text-lg">没有找到符合条件的钓点</p>
                        <p class="text-gray-400 text-sm mt-2">尝试调整筛选条件</p>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = spots.map(spot => `
                <div class="bg-white rounded-xl overflow-hidden shadow-lg spot-card">
                    <div class="h-48 bg-gradient-to-br ${spot.image} flex items-center justify-center">
                        <i data-lucide="map-pin" class="w-16 h-16 text-white opacity-60"></i>
                    </div>
                    <div class="p-5">
                        <div class="flex items-center justify-between mb-2">
                            <h3 class="text-lg font-bold text-gray-900">${spot.name}</h3>
                            ${spot.tags.length > 0 ? `
                                <div class="flex gap-1">
                                    ${spot.tags.map(tag => `<span class="bg-${tag === '免费' ? 'green' : 'blue'}-100 text-${tag === '免费' ? 'green' : 'blue'}-700 px-2 py-1 rounded text-xs font-medium">${tag}</span>`).join('')}
                                </div>
                            ` : ''}
                        </div>
                        <p class="text-sm text-gray-500 mb-2">${spot.province} · ${spot.city}</p>
                        <p class="text-gray-600 text-sm mb-3">${spot.description}</p>
                        
                        <div class="flex flex-wrap gap-2 mb-3">
                            ${spot.fish.map(f => `<span class="bg-gray-100 text-gray-700 px-2 py-1 rounded text-xs">${f}</span>`).join('')}
                        </div>
                        
                        <div class="flex items-center justify-between pt-3 border-t">
                            <div class="flex items-center">
                                <i data-lucide="star" class="w-4 h-4 text-yellow-500 fill-yellow-500 mr-1"></i>
                                <span class="font-medium text-gray-900">${spot.rating}</span>
                                <span class="text-gray-500 text-sm ml-1">(${spot.reviews})</span>
                            </div>
                            <span class="${spot.type === 'free' ? 'text-green-600' : 'text-primary-600'} font-medium text-sm">${spot.price}</span>
                        </div>
                        
                        <button onclick="viewSpotDetail(${spot.id})" class="w-full mt-4 bg-primary-50 hover:bg-primary-100 text-primary-600 py-2 rounded-lg font-medium transition">
                            查看详情
                        </button>
                    </div>
                </div>
            `).join('');
            
            lucide.createIcons();
        }

        // 搜索功能
        function searchSpots() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = spotsDatabase.filter(spot => 
                spot.name.toLowerCase().includes(query) ||
                spot.city.toLowerCase().includes(query) ||
                spot.fish.some(f => f.toLowerCase().includes(query))
            );
            renderSpots(filtered);
            addSpotMarkers(filtered);
        }

        // 筛选功能
        function filterSpots() {
            const province = document.getElementById('provinceFilter').value;
            let filtered = spotsDatabase;
            
            if (province) {
                filtered = filtered.filter(spot => spot.province === province);
            }
            
            renderSpots(filtered);
            addSpotMarkers(filtered);
        }

        // 按鱼种筛选
        function filterByFish(fish) {
            document.querySelectorAll('[data-fish]').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.fish === fish) btn.classList.add('active');
            });
            
            let filtered = spotsDatabase;
            
            if (fish !== 'all') {
                filtered = filtered.filter(spot => spot.fish.includes(fish));
            }
            
            renderSpots(filtered);
            addSpotMarkers(filtered);
        }

        // 按类型筛选
        function filterByType(type) {
            document.querySelectorAll('[data-type]').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.type === type) btn.classList.add('active');
            });
            
            let filtered = spotsDatabase;
            
            if (type === 'free') {
                filtered = filtered.filter(spot => spot.type === 'free');
            } else if (type === 'paid') {
                filtered = filtered.filter(spot => spot.type === 'paid');
            }
            
            renderSpots(filtered);
            addSpotMarkers(filtered);
        }

        // 查看详情
        function viewSpotDetail(id) {
            const spot = spotsDatabase.find(s => s.id === id);
            alert(`${spot.name}\n\n${spot.description}\n\n目标鱼种：${spot.fish.join('、')}\n最佳季节：${spot.bestSeason}\n难度：${spot.difficulty}\n${spot.type === 'free' ? '免费钓点' : '收费：' + spot.price}`);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initMap();
            renderSpots(spotsDatabase);
            lucide.createIcons();
        });

        // 搜索框回车
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchSpots();
        });
    </script>
</body>
</html>
