    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }

<body class="bg-gray-50">

    <!-- 导航栏 -->

    <!-- 页面标题 -->

            <h1 class="text-3xl md:text-4xl font-bold mb-2">装备评测库</h1>
            <p class="text-green-100 text-lg">真实评测，帮你选对装备不花冤枉钱</p>
        </div>
    </section>

    <!-- 分类筛选 -->
    <section class="py-6 bg-white border-b">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex flex-wrap items-center justify-between gap-4">
                <div class="flex gap-2 flex-wrap">
                    <button onclick="filterCategory('all')" class="category-btn active px-4 py-2 bg-green-600 text-white rounded-lg font-medium transition">全部</button>
                    <button onclick="filterCategory('rod')" class="category-btn px-4 py-2 bg-gray-100 text-gray-700 rounded-lg font-medium hover:bg-gray-200 transition">鱼竿</button>
                    <button onclick="filterCategory('reel')" class="category-btn px-4 py-2 bg-gray-100 text-gray-700 rounded-lg font-medium hover:bg-gray-200 transition">鱼轮</button>
                    <button onclick="filterCategory('lure')" class="category-btn px-4 py-2 bg-gray-100 text-gray-700 rounded-lg font-medium hover:bg-gray-200 transition">假饵</button>
                    <button onclick="filterCategory('accessory')" class="category-btn px-4 py-2 bg-gray-100 text-gray-700 rounded-lg font-medium hover:bg-gray-200 transition">配件</button>
                </div>
                <p class="text-gray-600">共 <span id="gearCount" class="font-bold text-green-600 text-lg">0</span> 款装备</p>
            </div>
        </div>
    </section>

    <!-- 装备列表 -->
    <section class="py-8">
        <div class="max-w-7xl mx-auto px-4">
            <div id="gearGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- 装备卡片由 JS 生成 -->
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="bg-gray-900 text-gray-300 py-8 mt-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-sm">&copy; 2026 路亚钓鱼网。All rights reserved.</p>
        </div>
    </footer>

            },
            {

                category: 'accessory',
                price: 68,

                reviews: 423,
                image: 'from-emerald-300 to-emerald-400',
                specs: { '类型': 'PE 线', '号数': '1.5 号', '长度': '150m' },
                scores: { 强度：92, 耐用性：90, 性价比：88 },

                cons: ['价格中等', '假货多']
            },
            {
                id: 12,
                name: 'VIB 金属振动饵',
                category: 'lure',
                price: 89,
                rating: 4.6,
                reviews: 345,
                image: 'from-indigo-300 to-indigo-400',
                specs: { '类型': 'VIB', '重量': '10g', '数量': '3 枚' },
                scores: { 泳姿：92, 耐用性：90, 诱鱼效果：92 },
                pros: ['全水层', '诱鱼强', '远投好'],
                cons: ['易挂底', '操作单一']
            }
        ];

        let currentCategory = 'all';

        function renderGear(category = 'all') {
            const grid = document.getElementById('gearGrid');
            const countEl = document.getElementById('gearCount');
            const filtered = category === 'all' ? gearDatabase : gearDatabase.filter(g => g.category === category);
            
            currentCategory = category;
            countEl.textContent = filtered.length;
            
            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-16">
                        <i data-lucide="inbox" class="w-16 h-16 text-gray-300 mx-auto mb-4"></i>
                        <p class="text-gray-500 text-lg">该分类下暂无装备</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }
            
            grid.innerHTML = filtered.map(gear => `
                <div class="bg-white rounded-xl overflow-hidden shadow-lg gear-card" onclick="viewDetail(${gear.id})">
                    <div class="h-40 bg-gradient-to-br ${gear.image} flex items-center justify-center">
                        <i data-lucide="package" class="w-16 h-16 text-white opacity-60"></i>
                    </div>
                    <div class="p-5">
                        <div class="mb-2">
                            <h3 class="text-lg font-bold text-gray-900">${gear.name}</h3>
                            <p class="text-sm text-gray-500">${getCategoryName(gear.category)}</p>
                        </div>
                        
                        <div class="flex items-center mb-3">
                            <i data-lucide="star" class="w-4 h-4 text-yellow-500 fill-yellow-500 mr-1"></i>
                            <span class="font-medium">${gear.rating}</span>
                            <span class="text-gray-500 text-sm ml-1">(${gear.reviews}条)</span>
                        </div>
                        
                        <div class="flex items-center justify-between pt-3 border-t">
                            <span class="text-2xl font-bold text-green-600">¥${gear.price}</span>
                            <button onclick="event.stopPropagation(); viewDetail(${gear.id})" class="bg-green-50 hover:bg-green-100 text-green-600 px-4 py-2 rounded-lg font-medium transition text-sm">
                                查看详情
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
            
            lucide.createIcons();
        }

        function getCategoryName(cat) {
            return { rod: '鱼竿', reel: '鱼轮', lure: '假饵', accessory: '配件' }[cat];
        }

        function filterCategory(category) {
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.className = 'category-btn px-4 py-2 bg-gray-100 text-gray-700 rounded-lg font-medium hover:bg-gray-200 transition';
            });
            event.target.className = 'category-btn active px-4 py-2 bg-green-600 text-white rounded-lg font-medium transition';
            renderGear(category);
        }

        function viewDetail(id) {
            const gear = gearDatabase.find(g => g.id === id);
            const specsHtml = Object.entries(gear.specs).map(([k, v]) => `<div><span class="text-gray-500">${k}:</span> <span class="font-medium">${v}</span></div>`).join('');
            const prosHtml = gear.pros.map(p => `<li class="text-green-700">✓ ${p}</li>`).join('');
            const consHtml = gear.cons.map(c => `<li class="text-red-700">✗ ${c}</li>`).join('');
            
            alert(`${gear.name}\n\n分类：${getCategoryName(gear.category)}\n价格：¥${gear.price}\n评分：${gear.rating} (${gear.reviews}条)\n\n${specsHtml}\n\n优点:\n${gear.pros.join('\n')}\n\n缺点:\n${gear.cons.join('\n')}`);
        }

        // 初始化
        renderGear();
        lucide.createIcons();
    </script>
</body>
</html>
