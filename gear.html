<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>路亚装备评测库 - 鱼竿/鱼轮/假饵真实评测</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#E8F5F5', 100: '#C9E8E8', 200: '#9DD6D6', 300: '#6BC0C0', 400: '#3FA8A8', 500: '#2D7D7D', 600: '#256666', 700: '#1F5252', 800: '#1A4343', 900: '#1A4D4D' },
                        accent: { light: '#F4A460', DEFAULT: '#D97B3D', dark: '#B8642B' }
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .hero-gradient { background: linear-gradient(135deg, #1A4D4D 0%, #2D7D7D 50%, #3FA8A8 100%); }
        .gear-card { transition: all 0.3s ease; }
        .gear-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
        .rating-bar { transition: width 0.5s ease; }
        .compare-modal { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-gray-50">

    <!-- 导航栏 -->
    <nav class="bg-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="flex items-center space-x-2">
                    <i data-lucide="fish" class="w-8 h-8 text-primary-500"></i>
                    <span class="text-xl font-bold text-gray-900">路亚钓鱼</span>
                </a>
                <div class="hidden md:flex space-x-8">
                    <a href="index.html" class="text-gray-700 hover:text-primary-500 font-medium">首页</a>
                    <a href="guide.html" class="text-gray-700 hover:text-primary-500 font-medium">入门指南</a>
                    <a href="spots.html" class="text-gray-700 hover:text-primary-500 font-medium">钓点推荐</a>
                    <a href="#" class="text-primary-500 font-medium">装备库</a>
                </div>
                <a href="guide.html" class="bg-primary-500 hover:bg-primary-600 text-white px-6 py-2 rounded-lg font-medium transition">开始学习</a>
            </div>
        </div>
    </nav>

    <!-- 页面标题 -->
    <section class="hero-gradient text-white py-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <h1 class="text-4xl md:text-5xl font-bold mb-4">装备评测库</h1>
            <p class="text-xl text-primary-100">真实评测，帮你选对装备不花冤枉钱</p>
        </div>
    </section>

    <!-- 分类导航 -->
    <section class="py-8 bg-white border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-wrap justify-center gap-4">
                <button class="category-btn active px-6 py-3 rounded-xl font-medium transition" data-category="all">
                    <i data-lucide="grid" class="w-5 h-5 inline mr-2"></i>
                    全部
                </button>
                <button class="category-btn px-6 py-3 rounded-xl font-medium transition border-2" data-category="rod">
                    <i data-lucide="circle-dot" class="w-5 h-5 inline mr-2"></i>
                    鱼竿
                </button>
                <button class="category-btn px-6 py-3 rounded-xl font-medium transition border-2" data-category="reel">
                    <i data-lucide="disc" class="w-5 h-5 inline mr-2"></i>
                    鱼轮
                </button>
                <button class="category-btn px-6 py-3 rounded-xl font-medium transition border-2" data-category="lure">
                    <i data-lucide="fish-symbol" class="w-5 h-5 inline mr-2"></i>
                    假饵
                </button>
                <button class="category-btn px-6 py-3 rounded-xl font-medium transition border-2" data-category="accessory">
                    <i data-lucide="toolbox" class="w-5 h-5 inline mr-2"></i>
                    配件
                </button>
            </div>
        </div>
    </section>

    <!-- 对比工具 -->
    <section class="py-8 bg-primary-50 border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <i data-lucide="git-compare" class="w-6 h-6 text-primary-500"></i>
                    <div>
                        <div class="font-bold text-gray-900">装备对比工具</div>
                        <div class="text-sm text-gray-600">选择 2-3 款装备进行详细对比</div>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="clearCompare()" class="text-gray-600 hover:text-gray-800 font-medium text-sm">
                        <i data-lucide="trash-2" class="w-4 h-4 inline mr-1"></i>
                        清空
                    </button>
                    <button onclick="openCompare()" class="bg-primary-500 hover:bg-primary-600 text-white px-6 py-3 rounded-lg font-medium transition inline-flex items-center">
                        <i data-lucide="layers" class="w-5 h-5 mr-2"></i>
                        开始对比
                        <span class="ml-2 bg-white text-primary-600 px-2 py-0.5 rounded text-sm font-bold" id="compareCount">0</span>
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- 装备列表 -->
    <section class="py-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6" id="gearGrid">
                <!-- 由 JS 动态生成 -->
            </div>
        </div>
    </section>

    <!-- 对比弹窗 -->
    <div id="compareModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 overflow-y-auto">
        <div class="min-h-screen px-4 py-8 flex items-center justify-center">
            <div class="bg-white rounded-2xl shadow-2xl max-w-6xl w-full mx-4 my-8">
                <!-- 弹窗头部 -->
                <div class="flex justify-between items-center p-6 border-b">
                    <h2 class="text-2xl font-bold text-gray-900">装备对比</h2>
                    <button onclick="closeCompare()" class="text-gray-400 hover:text-gray-600">
                        <i data-lucide="x" class="w-6 h-6"></i>
                    </button>
                </div>
                
                <!-- 对比内容 -->
                <div class="p-6" id="compareContent">
                    <!-- 由 JS 动态生成 -->
                </div>
                
                <!-- 弹窗底部 -->
                <div class="flex justify-end gap-4 p-6 border-t">
                    <button onclick="closeCompare()" class="px-6 py-3 border border-gray-300 rounded-lg font-medium text-gray-700 hover:bg-gray-50 transition">
                        关闭
                    </button>
                    <button onclick="closeCompare()" class="px-6 py-3 bg-primary-500 hover:bg-primary-600 text-white rounded-lg font-medium transition">
                        确定
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="bg-gray-900 text-gray-300 py-12 mt-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center">
                <div class="flex items-center justify-center space-x-2 mb-4">
                    <i data-lucide="fish" class="w-6 h-6 text-primary-400"></i>
                    <span class="text-lg font-bold text-white">路亚钓鱼</span>
                </div>
                <p class="text-sm text-gray-400">&copy; 2026 路亚钓鱼网。All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- 装备数据 -->
    <script src="database.js"></script>
    <script>
        let compareList = [];

        function renderGear(category = 'all') {
            const grid = document.getElementById('gearGrid');
            const filtered = category === 'all' ? gearDatabase : gearDatabase.filter(g => g.category === category);
            
            grid.innerHTML = filtered.map(gear => `
                <div class="bg-white rounded-xl overflow-hidden shadow-lg gear-card">
                    <div class="h-40 bg-gradient-to-br ${gear.image} flex items-center justify-center">
                        <i data-lucide="package" class="w-16 h-16 text-white opacity-60"></i>
                    </div>
                    <div class="p-5">
                        <div class="flex items-start justify-between mb-2">
                            <div>
                                <h3 class="text-lg font-bold text-gray-900">${gear.name}</h3>
                                <p class="text-sm text-gray-500">${getCategoryName(gear.category)}</p>
                            </div>
                            <button onclick="toggleCompare(${gear.id})" class="compare-btn ${compareList.includes(gear.id) ? 'bg-primary-500 text-white' : 'bg-gray-100 text-gray-600'} p-2 rounded-lg hover:bg-primary-100 transition">
                                <i data-lucide="layers" class="w-5 h-5"></i>
                            </button>
                        </div>
                        
                        <div class="flex items-center mb-3">
                            <i data-lucide="star" class="w-4 h-4 text-yellow-500 fill-yellow-500 mr-1"></i>
                            <span class="font-medium">${gear.rating}</span>
                            <span class="text-gray-500 text-sm ml-1">(${gear.reviews}条评价)</span>
                        </div>
                        
                        <div class="space-y-2 mb-4">
                            ${Object.entries(gear.scores).slice(0, 3).map(([key, value]) => `
                                <div class="flex items-center text-sm">
                                    <span class="text-gray-600 w-16">${key}</span>
                                    <div class="flex-grow bg-gray-200 rounded-full h-2 ml-2">
                                        <div class="bg-primary-500 h-2 rounded-full rating-bar" style="width: ${value}%"></div>
                                    </div>
                                    <span class="text-gray-700 font-medium ml-2 w-8">${value}</span>
                                </div>
                            `).join('')}
                        </div>
                        
                        <div class="flex items-center justify-between pt-3 border-t">
                            <span class="text-2xl font-bold text-primary-600">¥${gear.price}</span>
                            <button onclick="viewGearDetail(${gear.id})" class="bg-primary-50 hover:bg-primary-100 text-primary-600 px-4 py-2 rounded-lg font-medium transition">
                                查看详情
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
            
            lucide.createIcons();
        }

        function getCategoryName(cat) {
            return { rod: '鱼竿', reel: '鱼轮', lure: '假饵', accessory: '配件' }[cat] || cat;
        }

        function toggleCompare(id) {
            const index = compareList.indexOf(id);
            if (index > -1) {
                compareList.splice(index, 1);
            } else {
                if (compareList.length >= 3) {
                    alert('最多对比 3 款装备');
                    return;
                }
                compareList.push(id);
            }
            updateCompareCount();
            renderGear(document.querySelector('.category-btn.active').dataset.category);
        }

        function updateCompareCount() {
            document.getElementById('compareCount').textContent = compareList.length;
        }

        function clearCompare() {
            compareList = [];
            updateCompareCount();
            renderGear(document.querySelector('.category-btn.active').dataset.category);
        }

        function openCompare() {
            if (compareList.length < 2) {
                alert('请至少选择 2 款装备进行对比');
                return;
            }
            
            const selected = gearDatabase.filter(g => compareList.includes(g.id));
            renderCompareModal(selected);
            document.getElementById('compareModal').classList.remove('hidden');
            lucide.createIcons();
        }

        function closeCompare() {
            document.getElementById('compareModal').classList.add('hidden');
        }

        function renderCompareModal(gears) {
            const content = document.getElementById('compareContent');
            
            // 基本信息对比
            let html = `
                <div class="mb-8">
                    <h3 class="text-lg font-bold text-gray-900 mb-4">基本信息</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead>
                                <tr class="bg-gray-50">
                                    <th class="text-left p-4 font-medium text-gray-600">项目</th>
                                    ${gears.map(g => `<th class="text-left p-4 font-bold text-gray-900">${g.name}</th>`).join('')}
                                </tr>
                            </thead>
                            <tbody>
                                <tr class="border-t">
                                    <td class="p-4 text-gray-600">类别</td>
                                    ${gears.map(g => `<td class="p-4">${getCategoryName(g.category)}</td>`).join('')}
                                </tr>
                                <tr class="border-t bg-gray-50">
                                    <td class="p-4 text-gray-600">价格</td>
                                    ${gears.map(g => `<td class="p-4 text-2xl font-bold text-primary-600">¥${g.price}</td>`).join('')}
                                </tr>
                                <tr class="border-t">
                                    <td class="p-4 text-gray-600">评分</td>
                                    ${gears.map(g => `
                                        <td class="p-4">
                                            <div class="flex items-center">
                                                <i data-lucide="star" class="w-4 h-4 text-yellow-500 fill-yellow-500 mr-1"></i>
                                                <span class="font-bold">${g.rating}</span>
                                                <span class="text-gray-500 text-sm ml-1">(${g.reviews})</span>
                                            </div>
                                        </td>
                                    `).join('')}
                                </tr>
                                ${Object.keys(gears[0].specs).map(key => `
                                    <tr class="border-t ${key.includes('重量') || key.includes('长度') ? 'bg-gray-50' : ''}">
                                        <td class="p-4 text-gray-600">${key}</td>
                                        ${gears.map(g => `<td class="p-4">${g.specs[key] || '-'}</td>`).join('')}
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
                
                <div class="mb-8">
                    <h3 class="text-lg font-bold text-gray-900 mb-4">性能评分对比</h3>
                    <div class="space-y-4">
                        ${Object.keys(gears[0].scores).map(key => `
                            <div>
                                <div class="flex justify-between mb-2">
                                    <span class="text-gray-600 font-medium">${key}</span>
                                </div>
                                <div class="grid grid-cols-${gears.length} gap-4">
                                    ${gears.map(g => `
                                        <div>
                                            <div class="flex items-center justify-between mb-1">
                                                <span class="text-sm text-gray-500">${g.name}</span>
                                                <span class="text-sm font-bold text-gray-900">${g.scores[key]}</span>
                                            </div>
                                            <div class="bg-gray-200 rounded-full h-3">
                                                <div class="bg-primary-500 h-3 rounded-full" style="width: ${g.scores[key]}%"></div>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="grid md:grid-cols-${gears.length} gap-6">
                    ${gears.map(g => `
                        <div class="bg-gray-50 rounded-xl p-6">
                            <h4 class="font-bold text-gray-900 mb-3">${g.name}</h4>
                            <div class="mb-4">
                                <h5 class="text-sm font-medium text-green-700 mb-2 flex items-center">
                                    <i data-lucide="check-circle" class="w-4 h-4 mr-1"></i>
                                    优点
                                </h5>
                                <ul class="space-y-1">
                                    ${g.pros.map(p => `<li class="text-sm text-gray-600">• ${p}</li>`).join('')}
                                </ul>
                            </div>
                            <div>
                                <h5 class="text-sm font-medium text-red-700 mb-2 flex items-center">
                                    <i data-lucide="x-circle" class="w-4 h-4 mr-1"></i>
                                    缺点
                                </h5>
                                <ul class="space-y-1">
                                    ${g.cons.map(c => `<li class="text-sm text-gray-600">• ${c}</li>`).join('')}
                                </ul>
                            </div>
                        </div>
                    `).join('')}
                </div>
                
                <div class="mt-8 bg-blue-50 border border-blue-200 rounded-xl p-6">
                    <h4 class="font-bold text-blue-900 mb-2 flex items-center">
                        <i data-lucide="lightbulb" class="w-5 h-5 mr-2"></i>
                        选购建议
                    </h4>
                    <ul class="space-y-2 text-sm text-blue-800">
                        ${generateRecommendation(gears)}
                    </ul>
                </div>
            `;
            
            content.innerHTML = html;
        }

        function generateRecommendation(gears) {
            const bestRating = gears.reduce((max, g) => g.rating > max.rating ? g : max, gears[0]);
            const bestValue = gears.reduce((max, g) => (g.rating / g.price) > (max.rating / max.price) ? g : max, gears[0]);
            const cheapest = gears.reduce((min, g) => g.price < min.price ? g : min, gears[0]);
            
            return `
                <li>⭐ <strong>综合最佳</strong>: ${bestRating.name}（评分 ${bestRating.rating}）</li>
                <li>💰 <strong>性价比最高</strong>: ${bestValue.name}（¥${bestValue.price}）</li>
                <li>💵 <strong>最经济</strong>: ${cheapest.name}（¥${cheapest.price}）</li>
                <li>💡 <strong>新手推荐</strong>: 建议选择价格适中、评价较多的产品</li>
                <li>🎯 <strong>进阶选择</strong>: 关注性能评分，选择专业级装备</li>
            `;
        }

        function viewGearDetail(id) {
            const gear = gearDatabase.find(g => g.id === id);
            alert(`${gear.name}\n\n价格：¥${gear.price}\n评分：${gear.rating} (${gear.reviews}条评价)\n\n优点：${gear.pros.join('、')}\n缺点：${gear.cons.join('、')}`);
        }

        // 分类切换
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.category-btn').forEach(b => {
                    b.classList.remove('active', 'bg-primary-500', 'text-white');
                    b.classList.add('border-2');
                });
                this.classList.add('active', 'bg-primary-500', 'text-white');
                this.classList.remove('border-2');
                renderGear(this.dataset.category);
            });
        });

        // 初始化
        renderGear();
        lucide.createIcons();
    </script>
</body>
</html>
